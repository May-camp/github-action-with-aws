name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: 'Terraform Lint, Security Check, and Deploy'
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: 'us-east-1'
      TF_VERSION: '1.4.0'
      TFLINT_VERSION: '0.46.1'
      TFSEC_VERSION: '1.28.1'
      AWS_ACCESS_KEY_ID: 'mock_key'
      AWS_SECRET_ACCESS_KEY: 'mock_secret'
      AWS_DEFAULT_REGION: 'us-east-1'
      EDGE_BIND_TO_ALL_INTERFACES: "true"
      HOSTNAME_EXTERNAL: "localhost"
                
    steps:
    - name: 'Checkout GitHub repository'
      uses: actions/checkout@v2

    - name: 'Start LocalStack'
      run: |
        docker run -d \
          --network host \
          -e EDGE_BIND_TO_ALL_INTERFACES=true \
          localstack/localstack:latest
        
        echo "Waiting for LocalStack to be fully ready..."
        until $(curl --output /dev/null --silent --head --fail http://127.0.0.1:4566/_localstack/health); do
          printf '.'
          sleep 2
        done
        echo "LocalStack is online and ready!"

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: 'Install tflocal'
      run: |
        pip install terraform-local

    - name: 'Override Backend for LocalStack'
      run: |
        cat <<EOF > backend.tf
        terraform {
          backend "local" {}
        }
        EOF

    - name: 'Terraform Init'
      run: terraform init

    - name: 'Install TFLint'
      run: |
        curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v${{ env.TFLINT_VERSION }}/tflint_linux_amd64.zip
        unzip tflint.zip
        sudo mv tflint /usr/local/bin/
        tflint --version

    - name: 'Install tfsec'
      run: |
        curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/download/v${{ env.TFSEC_VERSION }}/tfsec-linux-amd64
        chmod +x tfsec
        sudo mv tfsec /usr/local/bin/
        tfsec --version

    - name: 'Terraform Format'
      run: terraform fmt

    - name: 'Terraform Validate'
      run: terraform validate

    - name: 'TFLint'
      run: |
        tflint --init
        tflint

    - name: 'tfsec'
      run: tfsec . --soft-fail
      
    - name: 'Terraform Plan'
      run: terraform plan -out=tfplan

    - name: 'Terraform Apply'
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve tfplan
